name: Build ZeroTrustAuditor

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore packages
        run: dotnet restore ZeroTrustAuditor.csproj

      - name: Publish win-x64
        run: |
          dotnet publish ZeroTrustAuditor.csproj `
            --configuration Release `
            --runtime win-x64 `
            --self-contained true `
            --output dist

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ZeroTrustAuditor-win-x64
          path: dist/
