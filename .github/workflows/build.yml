name: Build & Publish ZeroTrustAuditor

# Triggers:
#   - Every push to main (builds and uploads artifact)
#   - Every pull request to main (build check only, no artifact)
#   - Manual trigger from GitHub Actions tab (workflow_dispatch)
#   - Tagged release push v*.*.* (builds + creates a GitHub Release)

on:
  push:
    branches: [ main ]
    tags:     [ 'v*.*.*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create a GitHub Release?'
        required: false
        default: 'false'
        type: choice
        options: [ 'true', 'false' ]

permissions:
  contents: write   # needed to create releases and upload artifacts

env:
  DOTNET_VERSION: '8.0.x'
  PROJECT_FILE:   'ZeroTrustAuditor.csproj'
  RUNTIME:        'win-x64'
  OUTPUT_DIR:     'dist'

jobs:

  # ── Job 1: Build & Publish ───────────────────────────────────────────────────
  build:
    name: Build & Publish (win-x64)
    runs-on: windows-latest

    steps:

      # 1. Check out the repository
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so git describe works for version stamping

      # 2. Install .NET 8 SDK
      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      # 3. Restore NuGet packages
      #    (System.DirectoryServices, AccountManagement, Protocols)
      - name: Restore NuGet packages
        run: dotnet restore ${{ env.PROJECT_FILE }}

      # 4. Build (Debug) to catch compile errors fast before the full publish
      - name: Build (Debug - compile check)
        run: |
          dotnet build ${{ env.PROJECT_FILE }} `
            --configuration Debug `
            --no-restore

      # 5. Run the exact command from the requirements
      - name: Publish (Release - win-x64 self-contained)
        run: |
          dotnet publish ${{ env.PROJECT_FILE }} `
            --configuration Release `
            --runtime ${{ env.RUNTIME }} `
            --self-contained true `
            --output .\${{ env.OUTPUT_DIR }}

      # 6. Show what was produced
      - name: List dist contents
        run: |
          Write-Host "=== dist/ folder contents ===" -ForegroundColor Cyan
          Get-ChildItem -Path .\${{ env.OUTPUT_DIR }} -Recurse |
            Select-Object FullName, @{n='KB';e={[math]::Round($_.Length/1KB,1)}} |
            Format-Table -AutoSize
        shell: pwsh

      # 7. Stamp a build-info file into dist so you can tell which commit produced it
      - name: Write build-info.txt
        shell: pwsh
        run: |
          $info = @"
          ZeroTrustAuditor Build Info
          ============================
          Build date  : $(Get-Date -Format 'yyyy-MM-dd HH:mm:ss UTC')
          Commit SHA  : ${{ github.sha }}
          Ref         : ${{ github.ref }}
          Run number  : ${{ github.run_number }}
          Triggered by: ${{ github.actor }}
          "@
          $info | Set-Content .\${{ env.OUTPUT_DIR }}\build-info.txt
          Write-Host $info

      # 8. Zip the dist folder for upload
      - name: Zip dist folder
        shell: pwsh
        run: |
          Compress-Archive `
            -Path .\${{ env.OUTPUT_DIR }}\* `
            -DestinationPath .\ZeroTrustAuditor-win-x64.zip `
            -Force
          Write-Host "Archive size: $([math]::Round((Get-Item .\ZeroTrustAuditor-win-x64.zip).Length/1MB, 1)) MB"

      # 9. Upload the zip as a workflow artifact
      #    Available for 30 days under Actions -> this run -> Artifacts
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name:              ZeroTrustAuditor-win-x64-build${{ github.run_number }}
          path:              ZeroTrustAuditor-win-x64.zip
          retention-days:    30
          if-no-files-found: error

      # 10. Also upload the raw dist folder (useful for downloading individual files)
      - name: Upload dist folder artifact
        uses: actions/upload-artifact@v4
        with:
          name:              ZeroTrustAuditor-dist-build${{ github.run_number }}
          path:              ${{ env.OUTPUT_DIR }}/
          retention-days:    30
          if-no-files-found: error

  # ── Job 2: Create GitHub Release (tags + manual trigger only) ────────────────
  release:
    name: Create GitHub Release
    runs-on: windows-latest
    needs: build
    # Only run on a version tag push (e.g. v2.0.0) or manual trigger with create_release=true
    if: |
      startsWith(github.ref, 'refs/tags/v') ||
      github.event.inputs.create_release == 'true'

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore packages
        run: dotnet restore ${{ env.PROJECT_FILE }}

      - name: Publish Release build
        run: |
          dotnet publish ${{ env.PROJECT_FILE }} `
            --configuration Release `
            --runtime ${{ env.RUNTIME }} `
            --self-contained true `
            --output .\${{ env.OUTPUT_DIR }}

      - name: Write build-info.txt
        shell: pwsh
        run: |
          @"
          ZeroTrustAuditor ${{ github.ref_name }}
          ========================================
          Build date  : $(Get-Date -Format 'yyyy-MM-dd HH:mm:ss UTC')
          Commit SHA  : ${{ github.sha }}
          Ref         : ${{ github.ref }}
          Run number  : ${{ github.run_number }}
          "@ | Set-Content .\${{ env.OUTPUT_DIR }}\build-info.txt

      - name: Zip dist folder for release
        shell: pwsh
        run: |
          Compress-Archive `
            -Path .\${{ env.OUTPUT_DIR }}\* `
            -DestinationPath .\ZeroTrustAuditor-win-x64.zip `
            -Force

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name:               ${{ github.ref_name }}
          name:                   ZeroTrustAuditor ${{ github.ref_name }}
          draft:                  false
          prerelease:             false
          generate_release_notes: true
          files:                  ZeroTrustAuditor-win-x64.zip
          body: |
            ## ZeroTrustAuditor ${{ github.ref_name }}

            Read-only Zero Trust misconfiguration assessment for Windows Active Directory.
            Pure C# -- no PowerShell, no WMI, no external processes.

            ### Download
            Download `ZeroTrustAuditor-win-x64.zip`, extract it, and run:
            ```
            ZeroTrustAuditor.exe --hosts SRV01,SRV02 --domain corp.local
            ```

            ### Requirements
            - Windows 10 1809+ or Server 2019+
            - Domain User account (read-only)
            - Remote Registry service running on target hosts

            ### What's included
            - `ZeroTrustAuditor.exe` -- self-contained, no .NET install required on target
            - `audit-config.json` -- customize thresholds, exclusions, output formats
            - `build-info.txt` -- commit and build metadata
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
